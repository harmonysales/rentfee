<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>렌트료 비교</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f0f0f2;color:#111;font-size:14px}
.page{max-width:1040px;margin:0 auto;padding:20px 16px}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.header h1{font-size:18px;font-weight:700}
.upload-btn{font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid #d1d5db;background:#fff;cursor:pointer;color:#555;font-weight:500}
.upload-btn:hover{background:#f3f4f6}

.upload-panel{display:none;background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:14px;margin-bottom:14px}
.upload-panel.open{display:block}
.upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.drop-area{border:1.5px dashed #d1d5db;border-radius:8px;padding:14px;text-align:center;cursor:pointer;transition:all .15s}
.drop-area:hover,.drop-area.over{border-color:#3b82f6;background:#eff6ff}
.drop-area input{display:none}
.drop-label{font-size:12px;font-weight:600;margin-bottom:3px}
.drop-hint{font-size:11px;color:#aaa}
.drop-status{font-size:11px;color:#3b82f6;margin-top:5px;min-height:14px}
.cnt{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;margin-left:4px}
.cnt-h{background:#dbeafe;color:#1d4ed8}
.cnt-c{background:#fef3c7;color:#92400e}

.filter-bar{background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:11px 14px;margin-bottom:12px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.filter-bar label{font-size:11px;font-weight:600;color:#9ca3af}
select{font-size:13px;padding:5px 10px;border-radius:6px;border:1px solid #e5e7eb;background:#fff;cursor:pointer}
select:focus{outline:2px solid #3b82f6;border-color:#3b82f6}
.sep{width:1px;height:18px;background:#e5e7eb}
.reset-btn{font-size:12px;padding:5px 10px;border-radius:6px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;color:#666}
.reset-btn:hover{background:#f9fafb}

.month-nav{display:flex;gap:6px;margin-bottom:14px}
.mtab{flex:1;padding:10px 0;text-align:center;border-radius:8px;border:1.5px solid #e5e7eb;background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:#9ca3af;transition:all .15s}
.mtab:hover{border-color:#93c5fd;color:#3b82f6}
.mtab.active{background:#111;color:#fff;border-color:#111}

.placeholder{background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:60px;text-align:center;color:#bbb;font-size:14px}

/* KPI 4칸 */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.kpi{background:#fff;border-radius:10px;border:1px solid #e5e7eb;padding:13px 15px}
.kpi-label{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.kpi-val{font-size:19px;font-weight:700;line-height:1.1}
.kpi-sub{font-size:11px;color:#9ca3af;margin-top:3px}
.red{color:#dc2626}.grn{color:#16a34a}.ora{color:#d97706}

/* 인사이트 배너 */
.insight-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.insight{border-radius:10px;padding:13px 15px;border:1px solid transparent}
.ins-danger{background:#fef2f2;border-color:#fecaca}
.ins-good{background:#f0fdf4;border-color:#bbf7d0}
.ins-warn{background:#fffbeb;border-color:#fde68a}
.ins-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.ins-danger .ins-label{color:#dc2626}
.ins-good .ins-label{color:#16a34a}
.ins-warn .ins-label{color:#d97706}
.ins-body{font-size:12px;line-height:1.6}
.ins-danger .ins-body{color:#7f1d1d}
.ins-good .ins-body{color:#14532d}
.ins-warn .ins-body{color:#78350f}

/* 메인 카드 */
.main-card{background:#fff;border-radius:12px;border:1px solid #e5e7eb;overflow:hidden;margin-bottom:14px}
.card-head{padding:12px 16px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600;color:#374151}
.chart-btn{font-size:11px;padding:4px 10px;border-radius:5px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;color:#6b7280}
.chart-btn:hover{background:#f9fafb}
.chart-area{padding:14px 16px 4px;display:none;border-bottom:1px solid #f0f0f0}
.chart-area.open{display:block}
.chart-wrap{position:relative;width:100%;height:240px}
.legend{display:flex;gap:14px;margin-bottom:10px;font-size:12px;color:#6b7280}
.ld{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle}

/* 테이블 */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:9px 14px;text-align:left;font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #f0f0f0;background:#fafafa;white-space:nowrap}
th.r,td.r{text-align:right}
td{padding:10px 14px;border-bottom:1px solid #f7f7f7;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.car-name{font-weight:600}
.type-badge{font-size:10px;padding:1px 5px;border-radius:4px;font-weight:600;margin-left:5px;vertical-align:middle}
.type-new{background:#dcfce7;color:#166534}
.type-re{background:#f3f4f6;color:#6b7280}
.diff-tag{display:inline-block;padding:2px 8px;border-radius:5px;font-size:12px;font-weight:700}
.dt-up{background:#fef2f2;color:#b91c1c}
.dt-dn{background:#f0fdf4;color:#15803d}
.dt-eq{background:#f3f4f6;color:#6b7280}
.comp-bar-wrap{width:100px;display:inline-block;vertical-align:middle;margin-left:6px}
.comp-bar-bg{width:100%;height:6px;background:#f3f4f6;border-radius:3px;overflow:hidden}
.comp-bar-fill{height:100%;border-radius:3px;transition:width .3s}
.no-data{font-size:12px;color:#d1d5db}
.pct-chip{font-size:11px;font-weight:700;padding:1px 6px;border-radius:4px;margin-left:4px}
.pct-up{background:#fef2f2;color:#b91c1c}
.pct-dn{background:#f0fdf4;color:#15803d}
</style>
</head>
<body>
<div class="page">

<div class="header">
  <h1>렌트료 비교 대시보드</h1>
  <button class="upload-btn" onclick="document.getElementById('up').classList.toggle('open')">파일 추가 / 관리</button>
</div>

<div class="upload-panel" id="up">
  <div class="upload-grid">
    <div class="drop-area" id="dropH" onclick="document.getElementById('fH').click()" ondragover="ov(event,'H')" ondragleave="ol('H')" ondrop="od(event,'harmony')">
      <input type="file" id="fH" accept=".xlsx,.xls" multiple onchange="loadFiles(this.files,'harmony')">
      <div class="drop-label">하모니 (자사) <span class="cnt cnt-h" id="cntH">1766건</span></div>
      <div class="drop-hint">xlsx 드래그 또는 클릭해서 추가</div>
      <div class="drop-status" id="stH"></div>
    </div>
    <div class="drop-area" id="dropC" onclick="document.getElementById('fC').click()" ondragover="ov(event,'C')" ondragleave="ol('C')" ondrop="od(event,'comp')">
      <input type="file" id="fC" accept=".xlsx,.xls" multiple onchange="loadFiles(this.files,'comp')">
      <div class="drop-label">타사 <span class="cnt cnt-c" id="cntC">246건</span></div>
      <div class="drop-hint">xlsx 드래그 또는 클릭해서 추가</div>
      <div class="drop-status" id="stC"></div>
    </div>
  </div>
</div>

<div class="filter-bar">
  <label>차종</label>
  <select id="sCar" onchange="update()"><option value="">전체</option></select>
  <div class="sep"></div>
  <label>신차 / 재렌트</label>
  <select id="sType" onchange="update()">
    <option value="">전체</option>
    <option value="신차">신차</option>
    <option value="재렌트">재렌트</option>
  </select>
  <div class="sep"></div>
  <label>연도</label>
  <select id="sYear" onchange="update()">
    <option value="all">전체</option>
    <option value="2022">2022</option><option value="2023">2023</option>
    <option value="2024">2024</option><option value="2025">2025</option>
    <option value="2026">2026</option>
  </select>
  <button class="reset-btn" onclick="resetAll()">초기화</button>
</div>

<div class="month-nav">
  <button class="mtab" data-m="6"  onclick="setM(this)">6개월</button>
  <button class="mtab" data-m="12" onclick="setM(this)">12개월</button>
  <button class="mtab" data-m="24" onclick="setM(this)">24개월</button>
  <button class="mtab" data-m="36" onclick="setM(this)">36개월</button>
  <button class="mtab" data-m="48" onclick="setM(this)">48개월</button>
  <button class="mtab" data-m="60" onclick="setM(this)">60개월</button>
</div>

<div id="ph" class="placeholder">개월 탭을 선택하면 비교 결과가 표시됩니다</div>

<div id="ct" style="display:none">

  <!-- KPI -->
  <div class="kpi-row">
    <div class="kpi"><div class="kpi-label">하모니 평균 렌트료</div><div class="kpi-val" id="kHR">-</div><div class="kpi-sub" id="kHD">보증금 -</div></div>
    <div class="kpi"><div class="kpi-label">타사 평균 렌트료</div><div class="kpi-val" id="kCR">-</div><div class="kpi-sub" id="kCD">보증금 -</div></div>
    <div class="kpi"><div class="kpi-label">렌트료 차이</div><div class="kpi-val" id="kDR">-</div><div class="kpi-sub" id="kDD">-</div></div>
    <div class="kpi"><div class="kpi-label">경쟁력 현황</div><div class="kpi-val" id="kComp">-</div><div class="kpi-sub" id="kCompSub">-</div></div>
  </div>

  <!-- 인사이트 배너 -->
  <div class="insight-row">
    <div class="insight ins-danger" id="insExp">
      <div class="ins-label">가격 조정 필요</div>
      <div class="ins-body" id="insExpBody">-</div>
    </div>
    <div class="insight ins-good" id="insComp">
      <div class="ins-label">경쟁력 우위</div>
      <div class="ins-body" id="insCompBody">-</div>
    </div>
    <div class="insight ins-warn" id="insNoData">
      <div class="ins-label">타사 데이터 없음</div>
      <div class="ins-body" id="insNoDataBody">-</div>
    </div>
  </div>

  <!-- 비교 테이블 -->
  <div class="main-card">
    <div class="card-head">
      <span class="card-title" id="cardTitle">차종별 비교</span>
      <button class="chart-btn" id="chartBtn" onclick="toggleChart()">차트 보기</button>
    </div>
    <div class="chart-area" id="chartArea">
      <div class="legend">
        <span><span class="ld" style="background:#3b82f6"></span>하모니</span>
        <span><span class="ld" style="background:#f59e0b"></span>타사 평균</span>
      </div>
      <div class="chart-wrap"><canvas id="barC" role="img" aria-label="차종별 렌트료 비교 바 차트"></canvas></div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>차종</th>
          <th class="r">하모니 보증금</th>
          <th class="r">하모니 렌트료</th>
          <th class="r">타사 평균</th>
          <th class="r">차이</th>
          <th class="r">시장 대비</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

</div>
</div>

let selM=null, barInst=null;

const fmt  = n => n!=null?Math.round(n).toLocaleString('ko-KR')+'원':'-';
const fmtK = n => n!=null?Math.round(n/10000)+'만원':'-';

function ov(e,id){e.preventDefault();document.getElementById('drop'+id).classList.add('over');}
function ol(id){document.getElementById('drop'+id).classList.remove('over');}
function od(e,t){e.preventDefault();ol(t==='harmony'?'H':'C');loadFiles(e.dataTransfer.files,t);}

function loadFiles(files,type){
  const isH=type==='harmony';
  const st=document.getElementById(isH?'stH':'stC');
  let done=0;
  Array.from(files).forEach(file=>{
    const r=new FileReader();
    r.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
        isH?parseH(rows):parseC(rows);
        done++;
        if(done===files.length){
          st.textContent=files.length+'개 파일 추가됨';
          document.getElementById(isH?'cntH':'cntC').textContent=(isH?H:C).length+'건';
          initCarSel();
          if(selM) update();
        }
      }catch(err){st.textContent='오류: '+err.message;}
    };
    r.readAsArrayBuffer(file);
  });
}

function parseH(rows){
  // ffill 처리
  let lastCar='',lastType='',lastProd='';
  rows.forEach(r=>{
    const car=r['차종']||lastCar; lastCar=car;
    const type=r['신차구분']||lastType; lastType=type;
    const prod=r['상품명']||lastProd; lastProd=prod;
    const mo=parseInt(r['기간']||r['개월']||0);
    const rent=parseInt((r['총렌트료']||r['렌트료']||'0').toString().replace(/,/g,''));
    const dep=parseInt((r['보증금']||'0').toString().replace(/,/g,''));
    const date=String(r['차량등록일']||'').slice(0,10);
    const ok=(prod==='6&12렌트'&&[6,12].includes(mo))||(prod==='동반차'&&[36,48,60].includes(mo))||(mo===24);
    if(!ok||rent<=0||!car) return;
    H.push({date,car,type,product:prod,months:mo,deposit:dep,rent});
  });
}

function parseC(rows){
  const kw=['베뉴','싼타페','그랜저','쏘나타','아반떼','쏘렌토','카니발','팰리세이드','K5','K8','G80','G90','GV70','GV80','스포티지','셀토스','니로','코나','모닝','EV3','스타리아','캐스퍼','레이','투싼','토레스','액티언','트레일블레이저','아이오닉','QM6','XM3','포터','MINI','골프','아르카나'];
  let lastName='';
  rows.forEach(r=>{
    const raw=(r['차량명/등급']||r['차종']||'').toString();
    const name=raw.trim()||lastName; lastName=name;
    const mo=parseInt((r['개월']||'0').toString());
    const rent=parseInt((r['렌트비']||r['렌트료']||'0').toString().replace(/,/g,''))||0;
    const depRaw=parseFloat((r['보증금']||'0').toString().replace(/,/g,''))||0;
    const dep=depRaw<1000&&depRaw>0?depRaw*10000:depRaw;
    if(!name||![6,12,24,36,48,60].includes(mo)||rent<=0) return;
    let car=name.split(' ')[0];
    for(const k of kw){if(name.includes(k)){car=k;break;}}
    C.push({car,months:mo,deposit:dep,rent});
  });
}

function getHF(){
  const car=document.getElementById('sCar').value;
  const type=document.getElementById('sType').value;
  const yr=document.getElementById('sYear').value;
  return H.filter(d=>d.months===selM&&(!car||d.car===car)&&(!type||d.type===type)&&(yr==='all'||String(d.date).startsWith(yr)));
}
function getCF(){
  const car=document.getElementById('sCar').value;
  return C.filter(d=>d.months===selM&&(!car||d.car===car));
}

function buildCarMap(fd, cd){
  const hMap={};
  fd.forEach(d=>{
    if(!hMap[d.car])hMap[d.car]={rents:[],deps:[],types:new Set()};
    hMap[d.car].rents.push(d.rent);
    hMap[d.car].deps.push(d.deposit);
    hMap[d.car].types.add(d.type);
  });
  const cMap={};
  cd.forEach(d=>{
    if(!cMap[d.car])cMap[d.car]={rents:[],deps:[]};
    cMap[d.car].rents.push(d.rent);
    cMap[d.car].deps.push(d.deposit);
  });
  return {hMap,cMap};
}

function update(){
  if(!selM) return;
  const fd=getHF(), cd=getCF();
  const {hMap,cMap}=buildCarMap(fd,cd);

  // KPI
  const hR=avg(fd.map(d=>d.rent)), hD=avg(fd.map(d=>d.deposit));
  const cR=avg(cd.map(d=>d.rent)), cD=avg(cd.map(d=>d.deposit));
  document.getElementById('kHR').textContent=hR?fmt(hR):'-';
  document.getElementById('kHD').textContent='보증금 '+(hD?fmtK(hD):'-');
  document.getElementById('kCR').textContent=cR?fmt(cR):'-';
  document.getElementById('kCD').textContent='보증금 '+(cD?fmtK(cD):'-');

  const kDR=document.getElementById('kDR'), kDD=document.getElementById('kDD');
  if(hR&&cR){
    const dv=hR-cR, dp=pct(hR,cR);
    kDR.textContent=(dv>0?'+':'')+fmt(dv);
    kDR.className='kpi-val '+(dv>0?'red':'grn');
    kDD.textContent=(dp>0?'타사보다 '+dp+'% 비쌈':'타사보다 '+Math.abs(dp)+'% 저렴');
    kDD.style.color=dv>0?'#dc2626':'#16a34a';
  }else{kDR.textContent='-';kDR.className='kpi-val';kDD.textContent='-';kDD.style.color='';}

  // 경쟁력 현황
  const allCars=Object.keys(hMap);
  const compCars=allCars.filter(c=>cMap[c]);
  const cheaper=compCars.filter(c=>avg(hMap[c].rents)<avg(cMap[c].rents));
  const pricier=compCars.filter(c=>avg(hMap[c].rents)>avg(cMap[c].rents));
  const noComp=allCars.filter(c=>!cMap[c]);
  document.getElementById('kComp').textContent=cheaper.length+'종 우위';
  document.getElementById('kComp').className='kpi-val grn';
  document.getElementById('kCompSub').textContent=pricier.length+'종 열위 · '+noComp.length+'종 비교불가';

  // 인사이트 배너
  document.getElementById('insExpBody').textContent=
    pricier.length?pricier.map(c=>{const d=Math.round(avg(hMap[c].rents)-avg(cMap[c].rents));return c+' (+'+d.toLocaleString('ko-KR')+'원)';}).join(', '):'없음';
  document.getElementById('insCompBody').textContent=
    cheaper.length?cheaper.map(c=>{const d=Math.round(avg(cMap[c].rents)-avg(hMap[c].rents));return c+' (-'+d.toLocaleString('ko-KR')+'원)';}).join(', '):'없음';
  document.getElementById('insNoDataBody').textContent=
    noComp.length?noComp.join(', '):'전 차종 비교 가능';

  document.getElementById('cardTitle').textContent=selM+'개월 · '+MP[selM]+' 기준';
  if(document.getElementById('chartArea').classList.contains('open')) renderChart(hMap,cMap);
  renderTable(hMap,cMap);
}

function renderChart(hMap,cMap){
  const cars=[...new Set([...Object.keys(hMap),...Object.keys(cMap)])].sort((a,b)=>a.localeCompare(b,'ko'));
  const hV=cars.map(c=>hMap[c]?Math.round(avg(hMap[c].rents)):null);
  const cV=cars.map(c=>cMap[c]?Math.round(avg(cMap[c].rents)):null);
  if(barInst)barInst.destroy();
  barInst=new Chart(document.getElementById('barC').getContext('2d'),{
    type:'bar',
    data:{labels:cars,datasets:[
      {label:'하모니',data:hV,backgroundColor:'#3b82f6',borderRadius:4},
      {label:'타사',data:cV,backgroundColor:'#f59e0b',borderRadius:4}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>v.dataset.label+': '+Math.round(v.raw).toLocaleString('ko-KR')+'원'}}},
      scales:{y:{ticks:{callback:v=>Math.round(v/10000)+'만',font:{size:11}},grid:{color:'rgba(0,0,0,0.04)'}},
              x:{ticks:{font:{size:11},maxRotation:45},grid:{display:false}}}}
  });
}

function renderTable(hMap,cMap){
  const allCars=Object.keys(hMap).sort((a,b)=>a.localeCompare(b,'ko'));
  if(!allCars.length){
    document.getElementById('tbody').innerHTML='<tr><td colspan="6" style="padding:30px;text-align:center;color:#bbb">조건에 맞는 데이터가 없습니다</td></tr>';
    return;
  }

  // 전체 타사 평균 (시장 기준선)
  const allCompRents=Object.values(cMap).flatMap(v=>v.rents);
  const mktAvg=avg(allCompRents);

  document.getElementById('tbody').innerHTML=allCars.map(car=>{
    const h=hMap[car], c=cMap[car]||null;
    const hR=Math.round(avg(h.rents)), hD=Math.round(avg(h.deps));
    const cR=c?Math.round(avg(c.rents)):null;
    const diff=cR!=null?hR-cR:null;
    const dp=pct(hR,cR);
    const types=[...h.types];

    // 차이 태그
    let diffCell='-';
    if(diff!=null){
      const cls=diff>0?'dt-up':diff<0?'dt-dn':'dt-eq';
      diffCell=`<span class="diff-tag ${cls}">${diff>0?'+':''}${Math.round(diff).toLocaleString('ko-KR')}원</span>`;
    }

    // 시장대비 바 + %
    let mktCell='<span class="no-data">-</span>';
    if(cR!=null&&mktAvg){
      const ratio=Math.min(hR/mktAvg,2);
      const barW=Math.round(Math.min(ratio*50,100));
      const barCol=diff>0?'#fca5a5':diff<0?'#86efac':'#93c5fd';
      const pStr=(dp>0?'+':'')+dp+'%';
      const pCls=dp>0?'pct-up':'pct-dn';
      mktCell=`<div style="display:flex;align-items:center;justify-content:flex-end;gap:6px">
        <span class="pct-chip ${pCls}">${pStr}</span>
        <div class="comp-bar-wrap"><div class="comp-bar-bg"><div class="comp-bar-fill" style="width:${barW}%;background:${barCol}"></div></div></div>
      </div>`;
    }

    const typeBadges=types.map(t=>`<span class="type-badge ${t==='신차'?'type-new':'type-re'}">${t}</span>`).join('');

    return`<tr>
      <td><span class="car-name">${car}</span>${typeBadges}</td>
      <td class="r">${fmtK(hD)}</td>
      <td class="r"><b>${fmt(hR)}</b></td>
      <td class="r">${cR!=null?fmt(cR):'<span class="no-data">타사 데이터 없음</span>'}</td>
      <td class="r">${diffCell}</td>
      <td class="r">${mktCell}</td>
    </tr>`;
  }).join('');
}

function toggleChart(){
  const a=document.getElementById('chartArea');
  const btn=document.getElementById('chartBtn');
  a.classList.toggle('open');
  btn.textContent=a.classList.contains('open')?'차트 숨기기':'차트 보기';
  if(a.classList.contains('open')&&selM){
    const {hMap,cMap}=buildCarMap(getHF(),getCF());
    renderChart(hMap,cMap);
  }
}

function initCarSel(){
  const cars=[...new Set(H.map(d=>d.car))].sort((a,b)=>a.localeCompare(b,'ko'));
  const sel=document.getElementById('sCar');
  const prev=sel.value;
  sel.innerHTML='<option value="">전체 차종</option>';
  cars.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});
  if(prev)sel.value=prev;
}

function setM(btn){
  document.querySelectorAll('.mtab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  selM=+btn.dataset.m;
  document.getElementById('ph').style.display='none';
  document.getElementById('ct').style.display='block';
  update();
}

function resetAll(){
  document.getElementById('sCar').value='';
  document.getElementById('sType').value='';
  document.getElementById('sYear').value='all';
  if(selM) update();
}

initCarSel();
</script>
</body>
</html>
