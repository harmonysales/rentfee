<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하모니렌터카 렌트료 비교 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;font-size:14px}
.container{max-width:1200px;margin:0 auto;padding:20px}
h1{font-size:20px;font-weight:600;margin-bottom:4px;color:#1a1a1a}
.subtitle{font-size:13px;color:#666;margin-bottom:20px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;padding:12px;background:#fff;border-radius:10px;border:1px solid #e8e8e8}
.filter-row label{font-size:12px;color:#666;align-self:center}
select{font-size:13px;padding:6px 10px;border-radius:6px;border:1px solid #ddd;background:#fff;cursor:pointer}
select:focus{outline:2px solid #378ADD;border-color:#378ADD}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.metric{background:#fff;border-radius:10px;border:1px solid #e8e8e8;padding:14px 16px}
.metric-label{font-size:11px;color:#888;margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:0.03em}
.metric-value{font-size:22px;font-weight:600;color:#1a1a1a}
.card{background:#fff;border-radius:10px;border:1px solid #e8e8e8;padding:16px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:600;color:#555;margin-bottom:12px}
.legend{display:flex;gap:16px;margin-bottom:10px;font-size:12px;color:#666}
.legend-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:8px 10px;text-align:left;font-weight:600;font-size:11px;color:#888;border-bottom:1px solid #eee;background:#fafafa;text-transform:uppercase;letter-spacing:0.03em}
td{padding:8px 10px;border-bottom:1px solid #f0f0f0;color:#1a1a1a}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f9f9f9}
.tag{display:inline-block;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:600}
.tag-up{background:#fff0f0;color:#c0392b}
.tag-down{background:#f0fff4;color:#27ae60}
.chart-wrap{position:relative;width:100%;height:300px}
.chart-wrap-sm{position:relative;width:100%;height:220px}
</style>
</head>
<body>
<div class="container">
<h1>하모니렌터카 렌트료 비교 대시보드</h1>
<p class="subtitle">자사(하모니) vs 타사 렌트료 — 차종 · 상품 · 개월별 비교</p>

<div class="filter-row">
  <label>차종</label>
  <select id="selCar" onchange="update()"><option value="">전체</option></select>
  <label>상품</label>
  <select id="selProduct" onchange="update()">
    <option value="">전체</option>
    <option>동반차</option><option>하이렌트</option><option>마이다스</option><option>믿음카</option><option>오너형</option>
  </select>
  <label>개월</label>
  <select id="selMonths" onchange="update()">
    <option value="">전체</option>
    <option value="24">24개월</option><option value="36">36개월</option>
    <option value="48">48개월</option><option value="60">60개월</option>
  </select>
  <label>기간</label>
  <select id="selYear" onchange="update()">
    <option value="all">전체</option>
    <option value="2022">2022</option><option value="2023">2023</option>
    <option value="2024">2024</option><option value="2025">2025</option>
    <option value="2026">2026</option>
  </select>
</div>

<div class="metrics">
  <div class="metric"><div class="metric-label">하모니 평균</div><div class="metric-value" id="mH">-</div></div>
  <div class="metric"><div class="metric-label">타사 평균</div><div class="metric-value" id="mC">-</div></div>
  <div class="metric"><div class="metric-label">자사 - 타사</div><div class="metric-value" id="mD">-</div></div>
  <div class="metric"><div class="metric-label">조회 건수</div><div class="metric-value" id="mN">-</div></div>
</div>

<div class="card">
  <div class="card-title">차종별 렌트료 비교</div>
  <div class="legend">
    <span><span class="legend-dot" style="background:#378ADD"></span>하모니 (자사)</span>
    <span><span class="legend-dot" style="background:#EF9F27"></span>타사</span>
  </div>
  <div class="chart-wrap"><canvas id="barChart" role="img" aria-label="차종별 하모니 vs 타사 렌트료 비교"></canvas></div>
</div>

<div class="card">
  <div class="card-title">날짜별 하모니 렌트료 추이</div>
  <div class="legend"><span><span class="legend-dot" style="background:#378ADD"></span>하모니 추이</span></div>
  <div class="chart-wrap-sm"><canvas id="lineChart" role="img" aria-label="날짜별 렌트료 추이"></canvas></div>
</div>

<div class="card">
  <div class="card-title">상세 비교표</div>
  <table>
    <thead><tr><th>차종</th><th>상품</th><th>개월</th><th style="text-align:right">하모니</th><th style="text-align:right">타사</th><th style="text-align:right">차이</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
</div>

let bChart, lChart;
function avg(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0;}
function fmt(n){return n?Math.round(n).toLocaleString('ko-KR')+'원':'-';}

function getFiltered(){
  const car=document.getElementById('selCar').value;
  const prod=document.getElementById('selProduct').value;
  const mo=document.getElementById('selMonths').value;
  const yr=document.getElementById('selYear').value;
  return HARMONY.filter(d=>(!car||d.car===car)&&(!prod||d.product===prod)&&(!mo||d.months===+mo)&&(yr==='all'||d.date.startsWith(yr)));
}
function getCFiltered(){
  const car=document.getElementById('selCar').value;
  const mo=document.getElementById('selMonths').value;
  return COMP.filter(d=>(!car||d.car===car)&&(!mo||d.months===+mo));
}

function update(){
  const fd=getFiltered(), cd=getCFiltered();
  const ha=avg(fd.map(d=>d.price)), ca=avg(cd.map(d=>d.price));
  const diff=ha-ca;
  document.getElementById('mH').textContent=ha?fmt(ha):'-';
  document.getElementById('mC').textContent=ca?fmt(ca):'-';
  const de=document.getElementById('mD');
  if(ha&&ca){de.textContent=(diff>0?'+':'')+fmt(Math.abs(diff));de.style.color=diff>0?'#c0392b':'#27ae60';}
  else{de.textContent='-';de.style.color='';}
  document.getElementById('mN').textContent=fd.length;
  updateBar(fd,cd); updateLine(fd); updateTable(fd,cd);
}

function updateBar(fd,cd){
  const cars=[...new Set([...fd.map(d=>d.car),...cd.map(d=>d.car)])].sort((a,b)=>a.localeCompare(b,'ko'));
  const hd=cars.map(c=>{const r=fd.filter(d=>d.car===c);return r.length?Math.round(avg(r.map(d=>d.price))):null;});
  const cd2=cars.map(c=>{const r=cd.filter(d=>d.car===c);return r.length?Math.round(avg(r.map(d=>d.price))):null;});
  if(bChart)bChart.destroy();
  bChart=new Chart(document.getElementById('barChart').getContext('2d'),{
    type:'bar',
    data:{labels:cars,datasets:[{label:'하모니',data:hd,backgroundColor:'#378ADD',borderRadius:3},{label:'타사',data:cd2,backgroundColor:'#EF9F27',borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>v.dataset.label+': '+Math.round(v.raw).toLocaleString('ko-KR')+'원'}}},scales:{y:{ticks:{callback:v=>Math.round(v/10000)+'만',font:{size:11}},grid:{color:'rgba(0,0,0,0.05)'}},x:{ticks:{font:{size:11},maxRotation:45},grid:{display:false}}}}
  });
}

function updateLine(fd){
  const bd={};
  fd.forEach(d=>{if(!bd[d.date])bd[d.date]=[];bd[d.date].push(d.price);});
  const dates=Object.keys(bd).sort();
  const vals=dates.map(d=>Math.round(avg(bd[d])));
  if(lChart)lChart.destroy();
  lChart=new Chart(document.getElementById('lineChart').getContext('2d'),{
    type:'line',
    data:{labels:dates.map(d=>d.slice(0,7)),datasets:[{label:'하모니',data:vals,borderColor:'#378ADD',backgroundColor:'rgba(55,138,221,0.08)',tension:0.3,pointRadius:2,fill:true}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:v=>Math.round(v.raw).toLocaleString('ko-KR')+'원'}}},scales:{y:{ticks:{callback:v=>Math.round(v/10000)+'만',font:{size:11}},grid:{color:'rgba(0,0,0,0.05)'}},x:{ticks:{font:{size:10},maxTicksLimit:14},grid:{display:false}}}}
  });
}

function updateTable(fd,cd){
  const g={};
  fd.forEach(d=>{const k=d.car+'|'+d.product+'|'+d.months;if(!g[k])g[k]={car:d.car,product:d.product,months:d.months,p:[]};g[k].p.push(d.price);});
  const rows=Object.values(g).map(r=>{
    const ha=Math.round(avg(r.p));
    const cr=cd.filter(d=>d.car===r.car&&d.months===r.months);
    const ca=cr.length?Math.round(avg(cr.map(d=>d.price))):null;
    return{...r,ha,ca,diff:ca?ha-ca:null};
  }).sort((a,b)=>a.car.localeCompare(b.car,'ko')||(a.months-b.months));

  document.getElementById('tbody').innerHTML=rows.map(r=>{
    let dc='<td style="text-align:right">-</td>';
    if(r.diff!==null){const cls=r.diff>0?'tag-up':'tag-down';dc=`<td style="text-align:right"><span class="tag ${cls}">${r.diff>0?'+':''}${Math.round(r.diff).toLocaleString('ko-KR')}원</span></td>`;}
    return`<tr><td>${r.car}</td><td>${r.product}</td><td>${r.months}개월</td><td style="text-align:right">${r.ha.toLocaleString('ko-KR')}원</td><td style="text-align:right">${r.ca?r.ca.toLocaleString('ko-KR')+'원':'-'}</td>${dc}</tr>`;
  }).join('');
}

const cars=[...new Set(HARMONY.map(d=>d.car))].sort((a,b)=>a.localeCompare(b,'ko'));
const sel=document.getElementById('selCar');
cars.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});
update();
</script>
